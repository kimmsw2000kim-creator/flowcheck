spring:
  application:
    name: flowcheck
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowcheck}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:}

gemini:
  api-key: ${GEMINI_API_KEY:}

toss:
  secret-key: ${TOSS_SECRET_KEY:}
  client-key: ${TOSS_CLIENT_KEY:}
